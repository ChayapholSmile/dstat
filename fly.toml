app = "dstat"
primary_region = "sin"

[http_service]
  internal_port = 8080
  force_https = true
  
  # ตั้งค่าการเปิด-ปิดเครื่องอัตโนมัติ
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  # ระบบ Auto-scaling ตามโหลด
  [http_service.concurrency]
    type = "requests"
    soft_limit = 300  # ถ้าเครื่องนี้รับเกิน 300 req/sec Fly จะเริ่มเปิดเครื่องใหม่
    hard_limit = 500  # ถ้าเกิน 500 จะส่งไปเครื่องถัดไปทันที
