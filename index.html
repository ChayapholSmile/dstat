<!DOCTYPE html>
<html>
<head>
    <title>Fly.io Ultimate Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; margin: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; }
    </style>
</head>
<body>
    <h1>🚀 Fly.io Live Metrics (Auto-scaling Enabled)</h1>
    <div class="grid">
        <div class="card"><canvas id="requestChart"></canvas></div>
        <div class="card"><canvas id="cpuRamChart"></canvas></div>
        <div class="card"><canvas id="networkChart"></canvas></div>
        <div class="card"><canvas id="loadChart"></canvas></div>
    </div>

    <script>
        const chartConfig = (label, color) => ({
            type: 'line',
            data: { labels: [], datasets: [{ label, data: [], borderColor: color, fill: true, backgroundColor: color+'22', tension: 0.3 }] },
            options: { responsive: true, animation: false, scales: { y: { beginAtZero: true } } }
        });

        const reqChart = new Chart(document.getElementById('requestChart'), chartConfig('Requests Per Second', '#38bdf8'));
        const cpuChart = new Chart(document.getElementById('cpuRamChart'), {
            ...chartConfig('Usage %', '#f43f5e'),
            data: { labels: [], datasets: [
                { label: 'CPU %', data: [], borderColor: '#f43f5e' },
                { label: 'RAM %', data: [], borderColor: '#10b981' }
            ]}
        });

        async function update() {
            const r = await fetch('/api/stats');
            const d = await r.json();
            const time = new Date().toLocaleTimeString();

            const addData = (chart, dataPoints) => {
                if(chart.data.labels.length > 30) { chart.data.labels.shift(); chart.data.datasets.forEach(ds => ds.data.shift()); }
                chart.data.labels.push(time);
                dataPoints.forEach((val, i) => chart.data.datasets[i].data.push(val));
                chart.update();
            };

            addData(reqChart, [d.rps]);
            addData(cpuChart, [d.cpu, d.ram]);
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
